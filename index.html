<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHE-INTEL INDIA - Health Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0A0A0F;
            --bg-secondary: #12121A;
            --bg-tertiary: #1A1A24;
            --accent-primary: #E85A5A;
            --accent-secondary: #5AE8B5;
            --accent-tertiary: #E8C85A;
            --text-primary: #FAFAFA;
            --text-secondary: #A0A0B0;
            --text-muted: #606070;
            --border: #2A2A35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--bg-primary);
        }

        .brand-text h1 {
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        .brand-text p {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .state-selector {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            min-width: 180px;
        }

        .state-selector:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 0 48px;
        }

        .hero h2 {
            font-size: 56px;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .cta-button {
            background: linear-gradient(135deg, var(--accent-primary), #d14a4a);
            color: var(--text-primary);
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(232, 90, 90, 0.3);
        }

        /* Input Area */
        .input-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 0;
        }

        .input-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
        }

        .input-card label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .symptom-input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
        }

        .symptom-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        .symptom-input::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 24px;
        }

        .submit-button {
            background: linear-gradient(135deg, var(--accent-secondary), #4ac99a);
            color: var(--bg-primary);
            border: none;
            padding: 14px 32px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(90, 232, 181, 0.3);
        }

        /* Analysis Loader */
        .loader-section {
            text-align: center;
            padding: 80px 0;
        }

        .loader-title {
            font-size: 32px;
            margin-bottom: 48px;
        }

        .loader-steps {
            display: flex;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
        }

        .loader-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0.3;
            transition: opacity 0.5s;
        }

        .loader-step.active {
            opacity: 1;
        }

        .step-icon {
            width: 64px;
            height: 64px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .loader-step.active .step-icon {
            border-color: var(--accent-secondary);
            background: var(--bg-tertiary);
        }

        .step-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Results Dashboard */
        .results-dashboard {
            display: none;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            padding: 48px 0;
        }

        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .result-card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        /* Risk Gauge */
        .risk-gauge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .gauge-svg {
            width: 200px;
            height: 200px;
        }

        .gauge-background {
            fill: none;
            stroke: var(--bg-tertiary);
            stroke-width: 12;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--accent-primary);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 502;
            stroke-dashoffset: 502;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .gauge-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 500;
            fill: var(--text-primary);
        }

        .gauge-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Bar Chart */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            height: 180px;
            padding: 20px 0;
        }

        .bar {
            width: 40px;
            background: var(--accent-secondary);
            border-radius: 4px 4px 0 0;
            transition: height 0.5s ease-out;
        }

        .bar-label {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
        }

        /* Food Chips */
        .food-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .food-chip {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* AQI Badge */
        .aqi-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--bg-tertiary);
        }

        .aqi-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 500;
        }

        .aqi-label {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
            margin-top: 80px;
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 16px;
        }

        .footer a:hover {
            color: var(--accent-secondary);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .fade-in-delay-4 { animation-delay: 0.4s; opacity: 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo-section">
                <div class="logo">SI</div>
                <div class="brand-text">
                    <h1>SHE-INTEL INDIA</h1>
                    <p>Health Intelligence</p>
                </div>
            </div>
            <select class="state-selector" id="stateSelector">
                <option value="">Select State</option>
                <option value="DL">Delhi</option>
                <option value="MH">Maharashtra</option>
                <option value="KA">Karnataka</option>
                <option value="TN">Tamil Nadu</option>
                <option value="WB">West Bengal</option>
            </select>
        </header>

        <main id="app"></main>

        <footer class="footer">
            <p>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Disclaimer</a>
            </p>
            <p style="margin-top: 12px;">This is an AI-powered health intelligence tool. Consult a doctor for medical advice.</p>
        </footer>
    </div>

    <script>
        const state = {
            currentView: 'input',
            userProfile: {
                selectedState: '',
                symptoms: ''
            },
            analysisResult: null
        };

        function renderInputView() {
            return `
                <section class="hero fade-in">
                    <h2>Your Health.<br>Your Data.</h2>
                    <p>Advanced health intelligence powered by real-time environmental and community health data across India.</p>
                    <button class="cta-button" onclick="scrollToInput()">Run Health Analysis</button>
                </section>

                <section class="input-section fade-in fade-in-delay-2" id="inputSection">
                    <div class="input-card">
                        <label for="symptoms">Describe your symptoms or concerns</label>
                        <textarea 
                            class="symptom-input" 
                            id="symptoms"
                            placeholder="e.g., I have been experiencing headaches and fatigue for the past few days..."
                        ></textarea>
                        <div class="input-actions">
                            <button class="submit-button" onclick="analyzeSymptoms()">Analyze Health</button>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderLoaderView() {
            return `
                <section class="loader-section fade-in">
                    <h2 class="loader-title">Analyzing Health Data</h2>
                    <div class="loader-steps">
                        <div class="loader-step active" id="step1">
                            <div class="step-icon">🔍</div>
                            <span class="step-label">Processing Symptoms</span>
                        </div>
                        <div class="loader-step" id="step2">
                            <div class="step-icon">📊</div>
                            <span class="step-label">Checking AQI Data</span>
                        </div>
                        <div class="loader-step" id="step3">
                            <div class="step-icon">🏥</div>
                            <span class="step-label">Community Analysis</span>
                        </div>
                        <div class="loader-step" id="step4">
                            <div class="step-icon">🥗</div>
                            <span class="step-label">Diet Recommendations</span>
                        </div>
                        <div class="loader-step" id="step5">
                            <div class="step-icon">📋</div>
                            <span class="step-label">Generating Report</span>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderResultsView() {
            const result = state.analysisResult;
            return `
                <section class="results-dashboard fade-in" style="display: block;">
                    <div class="results-grid">
                        <div class="result-card">
                            <h3>Risk Assessment</h3>
                            <div class="risk-gauge">
                                <svg class="gauge-svg" viewBox="0 0 200 200">
                                    <circle class="gauge-background" cx="100" cy="100" r="80"/>
                                    <circle class="gauge-fill" cx="100" cy="100" r="80" id="gaugeFill"/>
                                    <text class="gauge-text" x="100" y="105" text-anchor="middle" id="gaugeText">0%</text>
                                </svg>
                                <span class="gauge-label">Overall Health Risk Index</span>
                            </div>
                        </div>

                        <div class="result-card">
                            <h3>Local Air Quality</h3>
                            <div class="aqi-badge">
                                <span class="aqi-value" style="color: ${result.aqiColor}">${result.aqi}</span>
                                <div>
                                    <div class="aqi-label">AQI Index</div>
                                    <div style="color: ${result.aqiColor}; font-weight: 500;">${result.aqiStatus}</div>
                                </div>
                            </div>
                        </div>

                        <div class="result-card">
                            <h3>Community Health Trends</h3>
                            <div class="bar-chart" id="barChart">
                                <div class="bar" style="height: 60%; background: var(--accent-secondary);"></div>
                                <div class="bar" style="height: 80%; background: var(--accent-tertiary);"></div>
                                <div class="bar" style="height: 45%; background: var(--accent-primary);"></div>
                                <div class="bar" style="height: 70%; background: var(--accent-secondary);"></div>
                                <div class="bar" style="height: 55%; background: var(--accent-tertiary);"></div>
                            </div>
                            <div style="display: flex; justify-content: center; gap: 12px; margin-top: 8px;">
                                <span class="bar-label">Mon</span>
                                <span class="bar-label">Tue</span>
                                <span class="bar-label">Wed</span>
                                <span class="bar-label">Thu</span>
                                <span class="bar-label">Fri</span>
                            </div>
                        </div>

                        <div class="result-card">
                            <h3>Dietary Recommendations</h3>
                            <div class="food-chips">
                                <span class="food-chip">🥬 Green Leafy Vegetables</span>
                                <span class="food-chip">🍊 Citrus Fruits</span>
                                <span class="food-chip">🥛 Turmeric Milk</span>
                                <span class="food-chip">💧 Increase Water Intake</span>
                                <span class="food-chip">🥘 Avoid Fried Foods</span>
                            </div>
                        </div>

                        <div class="result-card" style="grid-column: 1 / -1;">
                            <h3>Analysis Summary</h3>
                            <p style="color: var(--text-secondary); line-height: 1.8;">${result.summary}</p>
                        </div>
                    </div>
                </section>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            
            switch (state.currentView) {
                case 'input':
                    app.innerHTML = renderInputView();
                    break;
                case 'loader':
                    app.innerHTML = renderLoaderView();
                    runAnalysisAnimation();
                    break;
                case 'results':
                    app.innerHTML = renderResultsView();
                    setTimeout(animateResults, 100);
                    break;
            }
        }

        function scrollToInput() {
            document.getElementById('inputSection').scrollIntoView({ behavior: 'smooth' });
        }

        function analyzeSymptoms() {
            const symptoms = document.getElementById('symptoms').value;
            const state = document.getElementById('stateSelector').value;
            
            if (!symptoms.trim()) {
                alert('Please describe your symptoms');
                return;
            }
            
            state.userProfile.symptoms = symptoms;
            state.userProfile.selectedState = state;
            
            state.currentView = 'loader';
            render();
            
            setTimeout(() => {
                state.analysisResult = {
                    riskScore: 35,
                    aqi: 156,
                    aqiStatus: 'Unhealthy',
                    aqiColor: '#E85A5A',
                    summary: 'Based on your symptoms (headaches, fatigue) and current local air quality data showing moderate pollution levels, we recommend reducing outdoor activities during peak hours. The AQI in your area is 156, which falls in the "Unhealthy" category. Consider using N95 masks outdoors and ensuring proper ventilation at home.'
                };
                state.currentView = 'results';
                render();
            }, 4000);
        }

        function runAnalysisAnimation() {
            const steps = [1, 2, 3, 4, 5];
            let currentStep = 0;
            
            const interval = setInterval(() => {
                if (currentStep > 0) {
                    document.getElementById(`step${currentStep}`).classList.remove('active');
                }
                currentStep++;
                
                if (currentStep > 5) {
                    clearInterval(interval);
                    return;
                }
                
                document.getElementById(`step${currentStep}`).classList.add('active');
            }, 800);
        }

        function animateResults() {
            const result = state.analysisResult;
            const riskScore = result.riskScore;
            const circumference = 2 * Math.PI * 80;
            const offset = circumference - (riskScore / 100) * circumference;
            
            setTimeout(() => {
                document.getElementById('gaugeFill').style.strokeDashoffset = offset;
                document.getElementById('gaugeText').textContent = riskScore + '%';
            }, 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
