<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHE-INTEL INDIA - Health Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0A0A0F;
            --bg-secondary: #12121A;
            --bg-tertiary: #1A1A24;
            --accent-primary: #E85A5A;
            --accent-secondary: #5AE8B5;
            --accent-tertiary: #E8C85A;
            --accent-risk: #E85A5A;
            --accent-warning: #E8C85A;
            --text-primary: #FAFAFA;
            --text-secondary: #A0A0B0;
            --text-muted: #606070;
            --border: #2A2A35;
            --font-display: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--bg-primary);
        }

        .brand-text h1 {
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        .brand-text p {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .state-selector {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            min-width: 180px;
        }

        .state-selector:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 0 48px;
        }

        .hero h2 {
            font-size: 56px;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .cta-button {
            background: linear-gradient(135deg, var(--accent-primary), #d14a4a);
            color: var(--text-primary);
            border: none;
            padding: 16px 48px;
            font-size: 16px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(232, 90, 90, 0.3);
        }

        /* Input Area */
        .input-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 48px 0;
        }

        .input-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
        }

        .input-card label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .symptom-input {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
        }

        .symptom-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        .symptom-input::placeholder {
            color: var(--text-muted);
        }

        .input-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 24px;
        }

        .submit-button {
            background: linear-gradient(135deg, var(--accent-secondary), #4ac99a);
            color: var(--bg-primary);
            border: none;
            padding: 14px 32px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(90, 232, 181, 0.3);
        }

        /* Analysis Loader */
        .loader-section {
            text-align: center;
            padding: 80px 0;
        }

        .loader-title {
            font-size: 32px;
            margin-bottom: 48px;
        }

        .loader-steps {
            display: flex;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
        }

        .loader-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0.3;
            transition: opacity 0.5s;
        }

        .loader-step.active {
            opacity: 1;
        }

        .step-icon {
            width: 64px;
            height: 64px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .loader-step.active .step-icon {
            border-color: var(--accent-secondary);
            background: var(--bg-tertiary);
        }

        .step-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Results Dashboard */
        .results-dashboard {
            display: none;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            padding: 48px 0;
        }

        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .result-card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        /* Risk Gauge */
        .risk-gauge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .gauge-svg {
            width: 200px;
            height: 200px;
        }

        .gauge-background {
            fill: none;
            stroke: var(--bg-tertiary);
            stroke-width: 12;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--accent-primary);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 502;
            stroke-dashoffset: 502;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .gauge-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 500;
            fill: var(--text-primary);
        }

        .gauge-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Bar Chart */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            height: 180px;
            padding: 20px 0;
        }

        .bar {
            width: 40px;
            background: var(--accent-secondary);
            border-radius: 4px 4px 0 0;
            transition: height 0.5s ease-out;
        }

        .bar-label {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
        }

        /* Food Chips */
        .food-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .food-chip {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* AQI Badge */
        .aqi-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 12px;
            background: var(--bg-tertiary);
        }

        .aqi-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 500;
        }

        .aqi-label {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
            margin-top: 80px;
            text-align: center;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 16px;
        }

        .footer a:hover {
            color: var(--accent-secondary);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .fade-in-delay-4 { animation-delay: 0.4s; opacity: 0; }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .input-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 700px;
            margin: 0 auto;
        }

        .btn {
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-risk), #d14a4a);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(232, 90, 90, 0.3);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-secondary);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-risk);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        /* Loading View */
        .loading-view {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            padding: 40px 0;
        }

        .loading-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
        }

        .loading-spinner {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            position: relative;
        }

        .spinner-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .spinner-track {
            fill: none;
            stroke: var(--bg-tertiary);
            stroke-width: 8;
        }

        .spinner-progress {
            fill: none;
            stroke: var(--accent-risk);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            from { stroke-dashoffset: 283; }
            to { stroke-dashoffset: 0; }
        }

        .spinner-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .loading-steps {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .loading-step {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        .loading-step.active {
            opacity: 1;
        }

        .loading-step.completed {
            opacity: 1;
        }

        .step-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .loading-step.active .step-dot {
            background: var(--accent-risk);
            box-shadow: 0 0 12px var(--accent-risk);
        }

        .loading-step.completed .step-dot {
            background: var(--accent-secondary);
            box-shadow: 0 0 8px var(--accent-secondary);
        }

        .step-line {
            width: 2px;
            height: 40px;
            background: var(--border);
            flex-shrink: 0;
        }

        .loading-step:last-child .step-line {
            display: none;
        }

        .step-content {
            padding-bottom: 24px;
        }

        .step-text {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .step-subtext {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .results-view {
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .risk-gauge-container {
            display: flex;
            justify-content: center;
            margin-bottom: 48px;
        }

        .risk-gauge {
            width: 200px;
            height: 200px;
            position: relative;
        }

        .risk-gauge-svg {
            transform: rotate(-90deg);
        }

        .risk-gauge-track {
            fill: none;
            stroke: var(--bg-tertiary);
            stroke-width: 12;
        }

        .risk-gauge-progress {
            fill: none;
            stroke: var(--accent-risk);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 565;
            stroke-dashoffset: 565;
            animation: gaugeFill 1.5s ease-out forwards;
            filter: drop-shadow(0 0 8px var(--accent-risk));
        }

        @keyframes gaugeFill {
            to { stroke-dashoffset: var(--gauge-offset); }
        }

        .risk-gauge-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .risk-value {
            font-family: var(--font-mono);
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-risk);
        }

        .risk-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 40px;
        }

        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            animation: fadeIn 0.6s backwards;
        }

        .result-card:nth-child(1) { animation-delay: 0.1s; }
        .result-card:nth-child(2) { animation-delay: 0.2s; }
        .result-card:nth-child(3) { animation-delay: 0.3s; }
        .result-card:nth-child(4) { animation-delay: 0.4s; }
        .result-card:nth-child(5) { animation-delay: 0.5s; }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .food-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .food-chip {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .food-chip:hover {
            border-color: var(--accent-risk);
            color: var(--text-primary);
        }

        .diet-context {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .aqi-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(232, 90, 90, 0.15);
            border: 1px solid var(--accent-risk);
            border-radius: 8px;
            padding: 8px 16px;
            margin-bottom: 12px;
        }

        .aqi-level {
            font-weight: 600;
            color: var(--accent-risk);
        }

        .aqi-value-new {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
        }

        .bar-chart {
            margin-top: 12px;
        }

        .bar-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .bar-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            width: 120px;
        }

        .bar-track {
            flex: 1;
            height: 24px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-risk), #FF8080);
            border-radius: 4px;
            transition: width 1s ease-out;
        }

        .bar-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: var(--text-primary);
        }

        .gender-bias-stat {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .bias-percentage {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-tertiary);
        }

        .bias-context {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .action-list {
            list-style: none;
        }

        .action-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .action-item:last-child {
            border-bottom: none;
        }

        .action-number {
            width: 24px;
            height: 24px;
            background: var(--accent-risk);
            color: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .action-text {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .disclaimer {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: rgba(232, 200, 90, 0.1);
            border: 1px solid var(--accent-tertiary);
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 32px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .disclaimer-icon {
            font-size: 1.25rem;
        }

        .disclaimer span:last-child {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .results-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .results-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .results-subtitle {
            color: var(--text-secondary);
        }

        .risk-info-card {
            text-align: center;
            margin-bottom: 32px;
        }

        .condition-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            margin-bottom: 12px;
        }

        .deviation-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(232, 90, 90, 0.15);
            border: 1px solid var(--accent-risk);
            border-radius: 8px;
            padding: 8px 16px;
        }

        .deviation-icon {
            color: var(--accent-risk);
            font-weight: 600;
        }

        .deviation-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--accent-risk);
        }

        .deviation-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo-section">
                <div class="logo">SI</div>
                <div class="brand-text">
                    <h1>SHE-INTEL INDIA</h1>
                    <p>Health Intelligence</p>
                </div>
            </div>
            <select class="state-selector" id="stateSelector">
                <option value="">Select State</option>
                <option value="DL">Delhi</option>
                <option value="MH">Maharashtra</option>
                <option value="KA">Karnataka</option>
                <option value="TN">Tamil Nadu</option>
                <option value="WB">West Bengal</option>
            </select>
        </header>

        <main id="app"></main>

        <footer class="footer">
            <p>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Disclaimer</a>
            </p>
            <p style="margin-top: 12px;">This is an AI-powered health intelligence tool. Consult a doctor for medical advice.</p>
        </footer>
    </div>

    <script>
        const ANALYSIS_STEPS = [
            { id: 1, text: 'Extracting symptoms...', subtext: 'NLP parsing your input' },
            { id: 2, text: 'Building digital twin...', subtext: 'Comparing to your baseline' },
            { id: 3, text: 'Analyzing patterns...', subtext: 'Cross-referencing cycle history' },
            { id: 4, text: 'Enriching with India context...', subtext: 'Applying regional health data' },
            { id: 5, text: 'Computing risk scores...', subtext: 'Running ML prediction model' }
        ];

        function renderLoadingView() {
            return `
                <section class="loading-view">
                    <div class="loading-card">
                        <div class="loading-spinner">
                            <svg viewBox="0 0 100 100" class="spinner-svg">
                                <circle cx="50" cy="50" r="45" class="spinner-track"/>
                                <circle cx="50" cy="50" r="45" class="spinner-progress"/>
                            </svg>
                            <div class="spinner-number">1</div>
                        </div>
                        
                        <div class="loading-steps">
                            ${ANALYSIS_STEPS.map((step, i) => `
                                <div class="loading-step ${i === 0 ? 'active' : ''}" data-step="${step.id}">
                                    <div class="step-indicator">
                                        <span class="step-dot"></span>
                                        <span class="step-line"></span>
                                    </div>
                                    <div class="step-content">
                                        <div class="step-text">${step.text}</div>
                                        <div class="step-subtext">${step.subtext}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `;
        }

        function startLoadingAnimation() {
            const steps = document.querySelectorAll('.loading-step');
            const spinnerNumber = document.querySelector('.spinner-number');
            let currentStep = 0;
            
            const interval = setInterval(() => {
                steps.forEach((step, i) => {
                    step.classList.remove('active', 'completed');
                    if (i < currentStep) {
                        step.classList.add('completed');
                    } else if (i === currentStep) {
                        step.classList.add('active');
                    }
                });
                
                spinnerNumber.textContent = currentStep + 1;
                
                currentStep++;
                
                if (currentStep >= 5) {
                    clearInterval(interval);
                    setTimeout(() => {
                        showResults();
                    }, 500);
                }
            }, 600);
        }

        function showResults() {
            appState.analysisResult = {
                riskScore: 62,
                aqi: 58,
                aqiStatus: 'High',
                aqiColor: '#E85A5A',
                topRisk: {
                    condition: 'Iron Deficiency Anemia',
                    confidence: 62,
                    deviation: 42
                },
                indiaContext: {
                    diet: 'Rice-dominant meals with low iron bioavailability',
                    recommendations: ['Add vitamin C to meals', 'Pair iron with guava/lemon', 'Avoid tea with meals']
                },
                community: {
                    state: 'Tamil Nadu',
                    ageGroup: '18-25',
                    prevalence: 45
                },
                genderBias: {
                    condition: 'Iron Deficiency Anemia',
                    femaleSubjectUsage: 35
                },
                actions: [
                    'Request CBC test from your doctor',
                    'Add iron-rich foods: lentils, leafy greens, jaggery',
                    'Schedule ferritin and TIBC test',
                    'Consider iron supplementation after consulting doctor'
                ],
                summary: 'Based on your symptoms of fatigue, dizziness, hair fall, and irregular periods, combined with regional health data from Tamil Nadu, we have identified a high probability of Iron Deficiency Anemia. The rice-dominant diet common in this region contributes to low iron bioavailability. Consider adding vitamin C-rich foods like guava and lemon to improve iron absorption. Community data shows 45% prevalence in your age group. We recommend consulting a doctor for CBC and ferritin tests.'
            };
            
            appState.currentView = 'results';
            render();
        }

        const DEMO_PROFILE = {
            name: 'Priya',
            age: '22',
            state: 'Tamil Nadu',
            cyclePhase: 'luteal',
            symptoms: `Fatigue that feels heavier than usual, especially in the evenings
Dizziness when standing up quickly
Excessive hair fall for the past 3 cycles
Irregular periods this year
Brain fog and difficulty concentrating`
        };

        function loadDemoProfile() {
            appState.userProfile = { ...DEMO_PROFILE };
            document.getElementById('symptoms-input').value = appState.userProfile.symptoms;
            document.getElementById('state-select').value = appState.userProfile.state;
            document.getElementById('age-input').value = appState.userProfile.age;
            document.getElementById('cycle-phase').value = appState.userProfile.cyclePhase;
        }

        function runAnalysis() {
            const symptoms = document.getElementById('symptoms-input').value.trim();
            const selectedState = document.getElementById('state-select').value;
            const age = document.getElementById('age-input').value;
            const cyclePhase = document.getElementById('cycle-phase').value;
            
            if (!symptoms) {
                alert('Please describe your symptoms');
                return;
            }
            
            if (!selectedState) {
                alert('Please select your state');
                return;
            }
            
            appState.userProfile = { symptoms, state: selectedState, age, cyclePhase };
            appState.currentView = 'loading';
            render();
        }

        const appState = {
            currentView: 'input',
            userProfile: {
                selectedState: '',
                symptoms: ''
            },
            analysisResult: null
        };

        function renderInputView() {
            return `
                <section class="hero fade-in">
                    <h2 class="hero-title">Your Health.<br>Your Data.</h2>
                    <p class="hero-subtitle">Advanced health intelligence powered by real-time environmental and community health data across India.</p>
                </section>

                <section class="input-section fade-in fade-in-delay-2">
                    <div class="input-panel">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="age-input">Age</label>
                                <input type="number" id="age-input" placeholder="Enter your age" />
                            </div>
                            <div class="form-group">
                                <label for="state-select">State</label>
                                <select id="state-select">
                                    <option value="">Select State</option>
                                    <option value="Delhi">Delhi</option>
                                    <option value="Maharashtra">Maharashtra</option>
                                    <option value="Karnataka">Karnataka</option>
                                    <option value="Tamil Nadu">Tamil Nadu</option>
                                    <option value="West Bengal">West Bengal</option>
                                    <option value="Gujarat">Gujarat</option>
                                    <option value="Rajasthan">Rajasthan</option>
                                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="cycle-phase">Cycle Phase</label>
                                <select id="cycle-phase">
                                    <option value="">Select Phase</option>
                                    <option value="menstrual">Menstrual</option>
                                    <option value="follicular">Follicular</option>
                                    <option value="ovulation">Ovulation</option>
                                    <option value="luteal">Luteal</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="symptoms-input">Describe your symptoms or concerns</label>
                            <textarea 
                                id="symptoms-input" 
                                rows="5"
                                placeholder="e.g., I have been experiencing headaches and fatigue for the past few days..."
                            ></textarea>
                        </div>
                        <div style="display: flex; gap: 16px;">
                            <button class="btn btn-primary" id="run-analysis">
                                ⚡ Run Health Analysis
                            </button>
                            <button class="btn btn-secondary" id="load-demo">
                                Load Demo Profile
                            </button>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderLoaderView() {
            return `
                <section class="loader-section fade-in">
                    <h2 class="loader-title">Analyzing Health Data</h2>
                    <div class="loader-steps">
                        <div class="loader-step active" id="step1">
                            <div class="step-icon">🔍</div>
                            <span class="step-label">Processing Symptoms</span>
                        </div>
                        <div class="loader-step" id="step2">
                            <div class="step-icon">📊</div>
                            <span class="step-label">Checking AQI Data</span>
                        </div>
                        <div class="loader-step" id="step3">
                            <div class="step-icon">🏥</div>
                            <span class="step-label">Community Analysis</span>
                        </div>
                        <div class="loader-step" id="step4">
                            <div class="step-icon">🥗</div>
                            <span class="step-label">Diet Recommendations</span>
                        </div>
                        <div class="loader-step" id="step5">
                            <div class="step-icon">📋</div>
                            <span class="step-label">Generating Report</span>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderResultsView(result) {
            const gaugePercent = result.topRisk.confidence;
            const gaugeOffset = 565 - (565 * gaugePercent / 100);
            
            return `
                <div class="results-view">
                    <div class="results-header">
                        <h2 class="results-title">Health Analysis Complete</h2>
                        <p class="results-subtitle">Based on your profile and symptoms</p>
                    </div>
                    
                    <div class="risk-gauge-container">
                        <div class="risk-gauge">
                            <svg class="risk-gauge-svg" viewBox="0 0 200 200">
                                <circle class="risk-gauge-track" cx="100" cy="100" r="90"/>
                                <circle class="risk-gauge-progress" cx="100" cy="100" r="90" 
                                    style="--gauge-offset: ${gaugeOffset}"/>
                            </svg>
                            <div class="risk-gauge-value">
                                <div class="risk-value">${result.topRisk.confidence}%</div>
                                <div class="risk-label">Risk Level</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="risk-info-card">
                        <div class="condition-name">${result.topRisk.condition}</div>
                        <div class="deviation-badge">
                            <span class="deviation-icon">↑</span>
                            <span class="deviation-value">+${result.topRisk.deviation}%</span>
                            <span class="deviation-label">fatigue deviation from your baseline</span>
                        </div>
                    </div>
                    
                    <div class="results-grid">
                        ${renderIndiaContextCard(result.indiaContext)}
                        ${renderAQICard(result.aqi)}
                        ${renderCommunityCard(result.community)}
                        ${renderGenderBiasCard(result.genderBias)}
                        ${renderActionsCard(result.actions)}
                    </div>
                    
                    <div class="disclaimer">
                        <span class="disclaimer-icon">⚠️</span>
                        <span>Not a diagnosis. This is pattern-based insight. Please consult a healthcare professional for proper evaluation.</span>
                    </div>
                    
                    <button class="btn btn-secondary" id="start-over" style="margin-top: 32px;">
                        Start New Analysis
                    </button>
                </div>
            `;
        }

        function renderIndiaContextCard(ctx) {
            return `
                <div class="result-card">
                    <div class="card-title">🍛 India Context</div>
                    <div class="card-subtitle">Dietary patterns in ${ctx.diet.split(',')[0]}</div>
                    <p class="diet-context">${ctx.diet}</p>
                    <div class="food-chips">
                        ${ctx.recommendations.map(r => `<span class="food-chip">${r}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        function renderAQICard(aqi) {
            return `
                <div class="result-card">
                    <div class="card-title">🌬️ Air Quality</div>
                    <div class="card-subtitle">${aqi.city}</div>
                    <div class="aqi-badge">
                        <span class="aqi-level">${aqi.level}</span>
                        <span class="aqi-value-new">PM2.5 ${aqi.value} µg/m³</span>
                    </div>
                    <p style="font-size: 0.875rem; color: var(--text-secondary);">
                        High PM2.5 during luteal phase increases fatigue probability by 23%
                    </p>
                </div>
            `;
        }

        function renderCommunityCard(comm) {
            return `
                <div class="result-card">
                    <div class="card-title">📊 Community Intelligence</div>
                    <div class="card-subtitle">How you compare to women in ${comm.state}</div>
                    <div class="bar-chart">
                        <div class="bar-container">
                            <span class="bar-label">Your risk</span>
                            <div class="bar-track">
                                <div class="bar-fill" style="width: 62%"></div>
                            </div>
                            <span class="bar-value">62%</span>
                        </div>
                        <div class="bar-container">
                            <span class="bar-label">State avg</span>
                            <div class="bar-track">
                                <div class="bar-fill" style="width: ${comm.prevalence}%"></div>
                            </div>
                            <span class="bar-value">${comm.prevalence}%</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderGenderBiasCard(bias) {
            return `
                <div class="result-card">
                    <div class="card-title">⚖️ Gender Bias Radar</div>
                    <div class="card-subtitle">Research gap for ${bias.condition}</div>
                    <div class="gender-bias-stat">
                        <span class="bias-percentage">${bias.femaleSubjectUsage}%</span>
                        <span class="bias-context">of ${bias.condition} studies used female subjects. Diagnostic thresholds often set on male data.</span>
                    </div>
                </div>
            `;
        }

        function renderActionsCard(actions) {
            return `
                <div class="result-card" style="grid-column: span 2;">
                    <div class="card-title">✅ Recommended Actions</div>
                    <ul class="action-list">
                        ${actions.map((action, i) => `
                            <li class="action-item">
                                <span class="action-number">${i + 1}</span>
                                <span class="action-text">${action}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        function renderResultsViewOld() {
            const result = appState.analysisResult;
            return `
                <section class="results-dashboard fade-in" style="display: block;">
                    <div class="results-grid">
                        <div class="result-card">
                            <h3>Risk Assessment</h3>
                            <div class="risk-gauge">
                                <svg class="gauge-svg" viewBox="0 0 200 200">
                                    <circle class="gauge-background" cx="100" cy="100" r="80"/>
                                    <circle class="gauge-fill" cx="100" cy="100" r="80" id="gaugeFill"/>
                                    <text class="gauge-text" x="100" y="105" text-anchor="middle" id="gaugeText">0%</text>
                                </svg>
                                <span class="gauge-label">Overall Health Risk Index</span>
                            </div>
                        </div>

                        <div class="result-card">
                            <h3>Local Air Quality</h3>
                            <div class="aqi-badge">
                                <span class="aqi-value" style="color: ${result.aqiColor}">${result.aqi}</span>
                                <div>
                                    <div class="aqi-label">AQI Index</div>
                                    <div style="color: ${result.aqiColor}; font-weight: 500;">${result.aqiStatus}</div>
                                </div>
                            </div>
                        </div>

                        <div class="result-card">
                            <h3>Community Health Trends</h3>
                            <div class="bar-chart" id="barChart">
                                <div class="bar" style="height: 60%; background: var(--accent-secondary);"></div>
                                <div class="bar" style="height: 80%; background: var(--accent-tertiary);"></div>
                                <div class="bar" style="height: 45%; background: var(--accent-primary);"></div>
                                <div class="bar" style="height: 70%; background: var(--accent-secondary);"></div>
                                <div class="bar" style="height: 55%; background: var(--accent-tertiary);"></div>
                            </div>
                            <div style="display: flex; justify-content: center; gap: 12px; margin-top: 8px;">
                                <span class="bar-label">Mon</span>
                                <span class="bar-label">Tue</span>
                                <span class="bar-label">Wed</span>
                                <span class="bar-label">Thu</span>
                                <span class="bar-label">Fri</span>
                            </div>
                        </div>

                        <div class="result-card">
                            <h3>Dietary Recommendations</h3>
                            <div class="food-chips">
                                <span class="food-chip">🥬 Green Leafy Vegetables</span>
                                <span class="food-chip">🍊 Citrus Fruits</span>
                                <span class="food-chip">🥛 Turmeric Milk</span>
                                <span class="food-chip">💧 Increase Water Intake</span>
                                <span class="food-chip">🥘 Avoid Fried Foods</span>
                            </div>
                        </div>

                        <div class="result-card" style="grid-column: 1 / -1;">
                            <h3>Analysis Summary</h3>
                            <p style="color: var(--text-secondary); line-height: 1.8;">${result.summary}</p>
                        </div>
                    </div>
                </section>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            
            switch (appState.currentView) {
                case 'input':
                    app.innerHTML = renderInputView();
                    document.getElementById('run-analysis').addEventListener('click', runAnalysis);
                    document.getElementById('load-demo').addEventListener('click', loadDemoProfile);
                    break;
                case 'loading':
                    app.innerHTML = renderLoadingView();
                    startLoadingAnimation();
                    break;
                case 'results':
                    app.innerHTML = renderResultsView(appState.analysisResult);
                    break;
            }
        }

        function scrollToInput() {
            document.getElementById('inputSection')?.scrollIntoView({ behavior: 'smooth' });
        }

        function analyzeSymptoms() {
            runAnalysis();
        }
        
        document.addEventListener('click', (e) => {
            if (e.target.id === 'start-over') {
                appState.currentView = 'input';
                appState.userProfile = {};
                appState.analysisResult = null;
                render();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
