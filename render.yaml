services:
  - type: web
    name: she-intel-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./she_intel.db
      - key: XGB_MODEL_ARTIFACT_PATH
        value: backend/app/ml/artifacts/xgb_model.joblib
    autoDeploy: true