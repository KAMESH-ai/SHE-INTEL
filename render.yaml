services:
  - type: web
    name: she-intel-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: she-intel-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/she_intel.db
      - key: XGB_MODEL_ARTIFACT_PATH
        value: app/ml/artifacts/xgb_model.joblib
    autoDeploy: true